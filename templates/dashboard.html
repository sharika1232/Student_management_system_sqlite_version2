{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="container py-4">

    <!-- Welcome Card -->
    <div class="card shadow-lg border-0 mb-5">

        <div class="card-body text-center py-4">

            <h2 class="text-primary fw-bold">
                👋 Welcome, {{ username }}
            </h2>

            <p class="text-muted mb-0">
                Student Management System Dashboard
            </p>

        </div>

    </div>

    <!-- Dashboard Cards -->

    <div class="row g-4">

        <div class="col-12 col-sm-6 col-lg-3">

            <div class="card dashboard-card h-100 text-center">

                <div class="card-body d-flex flex-column justify-content-center">

                    <i class="fa-solid fa-user-plus fa-3x text-primary mb-3"></i>

                    <h4 class="mb-3">Add Student</h4>

                    <a href="{{ url_for('add_student') }}"
                       class="btn btn-primary mt-auto">
                        Open
                    </a>

                </div>

            </div>

        </div>

        <div class="col-12 col-sm-6 col-lg-3">

            <div class="card dashboard-card h-100 text-center">

                <div class="card-body d-flex flex-column justify-content-center">

                    <i class="fa-solid fa-users fa-3x text-success mb-3"></i>

                    <h4 class="mb-3">Students</h4>

                    <a href="{{ url_for('view_students') }}"
                       class="btn btn-success mt-auto">
                        View
                    </a>

                </div>

            </div>

        </div>

        <div class="col-12 col-sm-6 col-lg-3">

            <div class="card dashboard-card h-100 text-center">

                <div class="card-body d-flex flex-column justify-content-center">

                    <i class="fa-solid fa-pen-to-square fa-3x text-warning mb-3"></i>

                    <h4 class="mb-3">Update</h4>

                    <a href="{{ url_for('view_students') }}"
                       class="btn btn-warning mt-auto">
                        Update
                    </a>

                </div>

            </div>

        </div>

        <div class="col-12 col-sm-6 col-lg-3">

            <div class="card dashboard-card h-100 text-center">

                <div class="card-body d-flex flex-column justify-content-center">

                    <i class="fa-solid fa-trash fa-3x text-danger mb-3"></i>

                    <h4 class="mb-3">Delete</h4>

                    <a href="{{ url_for('view_students') }}"
                       class="btn btn-danger mt-auto">
                        Delete
                    </a>

                </div>

            </div>

        </div>

    </div>

    <!-- Logout -->

    <div class="text-center mt-5">

        <a href="{{ url_for('logout') }}"
           class="btn btn-dark btn-lg">

            <i class="fa-solid fa-right-from-bracket"></i>

            Logout

        </a>

    </div>

</div>

{% endblock %}
