
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Student Management System{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand fw-bold" href="/dashboard">

<i class="fa-solid fa-graduation-cap"></i>

Student Management

</a>

<div>

<a href="/dashboard" class="btn btn-light btn-sm me-2">
Dashboard
</a>

<a href="/add-student" class="btn btn-success btn-sm me-2">
Add Student
</a>

<a href="{{ url_for('view_students') }}" class="btn btn-warning btn-sm me-2" >Students</a>

<a href="/logout" class="btn btn-danger btn-sm">
Logout
</a>

</div>

</div>

</nav>

<div class="container py-5">

{% block content %}

{% endblock %}

</div>

<footer>

<p>

© 2026 Student Management System ❤️

</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
