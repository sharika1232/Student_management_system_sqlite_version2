{% extends "base.html" %}

{% block title %}Add Student{% endblock %}

{% block content %}

<div class="container mt-5 mb-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header bg-primary text-white text-center rounded-top-4">
                    <h3 class="mb-0">➕ Add Student</h3>
                </div>

                <div class="card-body p-4">

                    <!-- Flash Messages -->
                    {% with messages = get_flashed_messages() %}
                        {% if messages %}
                            {% for msg in messages %}
                                <div class="alert alert-success alert-dismissible fade show">
                                    {{ msg }}
                                    <button class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">Student Name</label>
                            <input type="text" class="form-control" name="name" placeholder="Enter student name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" name="email" placeholder="Enter email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Course</label>
                            <input type="text" class="form-control" name="course" placeholder="Enter course" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Mobile Number</label>
                            <input type="text" class="form-control" name="mobile" placeholder="Enter mobile number" required>
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-primary btn-lg">
                                ➕ Add Student
                            </button>
                        </div>

                    </form>

                </div>

                <div class="card-footer text-center bg-white">
                    <a href="/dashboard" class="btn btn-outline-secondary">
                        ⬅ Back to Dashboard
                    </a>
                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
