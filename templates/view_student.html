
{% extends "base.html" %}

{% block title %}Student Details{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header bg-info text-white text-center">
                    <h3>👨‍🎓 Student Details</h3>
                </div>

                <div class="card-body text-center">

                    <!-- Profile Icon -->
                    <i class="fa-solid fa-user-graduate fa-5x text-primary mb-4"></i>

                    <table class="table table-bordered">

                        <tr>
                            <th width="35%">Student ID</th>
                            <td>{{ student.id }}</td>
                        </tr>

                        <tr>
                            <th>Name</th>
                            <td>{{ student.name }}</td>
                        </tr>

                        <tr>
                            <th>Email</th>
                            <td>{{ student.email }}</td>
                        </tr>

                        <tr>
                            <th>Course</th>
                            <td>{{ student.course }}</td>
                        </tr>

                        <tr>
                            <th>Mobile</th>
                            <td>{{ student.mobile }}</td>
                        </tr>

                    </table>

                    <div class="mt-4">

                        <a href="{{ url_for('view_students') }}"
                           class="btn btn-primary">

                            ⬅ Back to Students

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
